# Deploy config — the app lives in frontend/ (static Vite SPA, no backend).
# Works for Netlify (git-connect or `netlify deploy`). For Vercel, instead set
# Root Directory = frontend in the dashboard (build `npm run build`, output `dist`).
[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

# SPA fallback so deep links (?tab=...) resolve
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
